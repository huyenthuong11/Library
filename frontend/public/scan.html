<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Scan QR</title>

  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    #reader {
      width: 400px;
      margin: 20px auto;
    }

    .status {
      margin-top: 10px;
      font-size: 20px;
      color: #666;
    }

    .success {
      color: green;
      font-weight: bold;
    }

    .error {
      color: red;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      border: none;
      background: #1976d2;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>Quét QR bằng điện thoại</h2>

  <div id="reader"></div>

  <div class="status" id="status">Đang khởi động camera...</div>

  <button onclick="restart()">Quét lại</button>

  <script>
    const statusEl = document.getElementById("status");
    let html5QrCode;

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width: 500, height: 500 }
        },
        onScanSuccess,
        onScanError
      ).then(() => {
        statusEl.innerText = "Đưa QR vào khung";
      }).catch(err => {
        statusEl.innerText = "Không mở được camera";
        statusEl.className = "status error";
        console.error(err);
      });
    }

    function onScanSuccess(decodedText) {
      console.log("QR:", decodedText);

      statusEl.innerText = "Đang gửi dữ liệu...";
      statusEl.className = "status";

      // gửi về backend
      axios.post(`http://192.168.1.3:5000/scan?t=${new Date().getTime()}`, {
        readerId: decodedText
      })
      .then(() => {
        statusEl.innerText = "Đã gửi thành công!";
        statusEl.className = "status success";
      })
      .catch(err => {
        statusEl.innerText = "Lỗi: " + (err.response ? err.response.status : err.message);
        statusEl.className = "status error";
        console.error(err);
      });

      html5QrCode.stop();
    }

    function onScanError(err) {
      // bỏ qua lỗi scan liên tục
    }

    async function restart() {
      statusEl.innerText = "Đang bật lại camera...";
      statusEl.className = "status";

      if (html5QrCode) {
        await html5QrCode.stop().then(() => {
          startScanner();
        });
      } else {
        startScanner();
      }
    }

    // auto start
    startScanner();
  </script>

</body>
</html>
